apiVersion: apps/v1
kind: Deployment
metadata:
  name: mri-phen-api-deployment
  labels:
    app: mri-phen-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mri-phen-api
  template:
    metadata:
      labels:
        app: mri-phen-api
    spec:
      containers:
      - name: mri-phen-api
        image: mri_phen_api:latest
        imagePullPolicy: IfNotPresent
        command: ["uv", "run", "uvicorn", "serving.app:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
