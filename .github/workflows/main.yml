name: CI/CD Pipeline for MRI Phenotyping

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint_and_test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv
          uv sync --frozen

      - name: Run Ruff Linter
        run: uv run ruff check . || echo "Skipping hard fail for demonstration"

      - name: Run Pyright Type Checking
        run: uv run pyright || echo "Skipping hard fail for demonstration"

  build_and_push:
    name: Build & Deploy Simulator
    needs: lint_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          # Mô phỏng quá trình build docker image. 
          # docker build -t mri_phen_api:latest -f Dockerfile .
          echo "Docker image built successfully"

      - name: Push to Registry (Mock)
        run: |
          echo "Simulating push to Docker Hub / GHCR"
          echo "mri_phen_api:latest push success"

